quarkus.http.port=8080

# Chroma vector store
quarkus.langchain4j.chroma.url=http://chroma:8080
quarkus.langchain4j.chroma.collection-name=quantumpulse
# all-minilm-l6-v2 produces 384-dim vectors
quarkus.langchain4j.chroma.dimension=384
quarkus.langchain4j.chroma.timeout=30s

# Document source loaded at startup
rag.source.url=https://gitea-gitea.apps.cluster-5hrgj.5hrgj.sandbox1830.opentlc.com/starter/INSTRUCTIONS/raw/branch/main/resources/quantumpulse-3000.md
rag.chunk.paragraphs=8
rag.search.max-results=3

# Local dev override: run Chroma on host at port 8000
%dev.quarkus.langchain4j.chroma.url=http://localhost:8000
